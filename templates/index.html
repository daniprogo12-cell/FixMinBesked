<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixMinBesked.dk</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="hero-badge">Dansk beskedværktøj</div>
            <h1>FixMinBesked.dk</h1>
            <p>
                Ret din besked på dansk – så den bliver mere venlig,
                professionel eller mindre direkte.
            </p>
        </section>

        <section class="card">
            <label for="message" class="label">DIN BESKED</label>
            <textarea
                id="message"
                placeholder="Indsæt din besked her..."
            ></textarea>

            <div class="tone-section">
                <span class="label">VÆLG STIL</span>

                <div class="tone-buttons">
                    <button type="button" class="tone-btn active" data-tone="Professionel">Gør professionel</button>
                    <button type="button" class="tone-btn" data-tone="Venlig">Gør venlig</button>
                    <button type="button" class="tone-btn" data-tone="Kortere">Gør kortere</button>
                    <button type="button" class="tone-btn" data-tone="Kollega">Til kollega</button>
                    <button type="button" class="tone-btn" data-tone="Chef">Til chef</button>
                    <button data-tone="Afvisning">Afvisning uden konflikt</button>
                    <button data-tone="Rykker">Send rykker</button>
                </div>
            </div>

            <button id="rewriteBtn" class="primary-btn">Fix min besked</button>

            <div class="output-section">
                <div class="output-header">
                    <span class="label">FORSLAG</span>
                    <button id="copyBtn" class="copy-btn" type="button">Kopiér</button>
                </div>

                <div id="output" class="output-box">
                    Her vises den forbedrede tekst...
                </div>
            </div>

            <p id="statusMessage" class="status-message"></p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
